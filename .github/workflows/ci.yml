name: ci

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      - uses: actions/setup-node@v4
        with:
          node-version: latest
      - uses: oven-sh/setup-bun@v2
      - uses: denoland/setup-deno@v1

      - name: Install Dart deps
        run: dart pub get

      - name: Install JS test deps (bun)
        run: bun install --cwd test/js

      - name: Format
        run: dart format --output=none --set-exit-if-changed lib test example bin

      - name: Analyze
        run: dart analyze lib test example bin

      - name: Dart tests
        run: dart test

      - name: JS runtime integration tests
        run: bun test --cwd test/js
